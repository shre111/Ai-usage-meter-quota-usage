<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>AI Usage Metering & Quota — Demo</title>
<style>
  :root {
    --bg: #0f1420; --card: #18202f; --muted: #8b97ad; --text: #e7ecf3;
    --line: #27314a; --accent: #4f8cff; --green: #2fbf71; --red: #ef5350;
    --amber: #f0a93b;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg); color: var(--text);
  }
  header {
    padding: 18px 24px; border-bottom: 1px solid var(--line);
    display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
  }
  header h1 { font-size: 17px; margin: 0; font-weight: 600; }
  header .spacer { flex: 1; }
  .userbar { display: flex; align-items: center; gap: 8px; }
  main { max-width: 1080px; margin: 0 auto; padding: 24px; display: grid;
         grid-template-columns: 340px 1fr; gap: 20px; align-items: start; }
  .col { display: flex; flex-direction: column; gap: 20px; }
  .card { background: var(--card); border: 1px solid var(--line); border-radius: 12px; padding: 18px; }
  .card h2 { font-size: 13px; text-transform: uppercase; letter-spacing: .05em;
             color: var(--muted); margin: 0 0 14px; }
  label { display: block; font-size: 12px; color: var(--muted); margin: 10px 0 4px; }
  input, textarea {
    width: 100%; background: #0d1320; border: 1px solid var(--line); color: var(--text);
    border-radius: 8px; padding: 9px 10px; font: inherit;
  }
  textarea { resize: vertical; min-height: 76px; }
  button {
    background: var(--accent); color: #fff; border: 0; border-radius: 8px;
    padding: 9px 14px; font: inherit; font-weight: 600; cursor: pointer;
  }
  button.secondary { background: #2a3550; }
  button.ghost { background: transparent; border: 1px solid var(--line); color: var(--muted); }
  button:active { transform: translateY(1px); }
  .row { display: flex; gap: 8px; flex-wrap: wrap; }
  .row > * { flex: 1; }
  .metrics { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
  .metric { background: #0d1320; border: 1px solid var(--line); border-radius: 8px; padding: 10px; }
  .metric .v { font-size: 20px; font-weight: 700; }
  .metric .k { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .04em; }
  .bar { height: 10px; background: #0d1320; border: 1px solid var(--line); border-radius: 99px; overflow: hidden; }
  .bar > span { display: block; height: 100%; background: linear-gradient(90deg, var(--green), var(--accent)); }
  .bar.over > span { background: linear-gradient(90deg, var(--amber), var(--red)); }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th, td { text-align: left; padding: 8px 10px; border-bottom: 1px solid var(--line); white-space: nowrap; }
  th { color: var(--muted); font-weight: 600; font-size: 11px; text-transform: uppercase; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 99px; font-size: 11px; font-weight: 700; }
  .badge.success { background: rgba(47,191,113,.16); color: var(--green); }
  .badge.failed, .badge.rejected { background: rgba(239,83,80,.16); color: var(--red); }
  .result { background: #0d1320; border: 1px solid var(--line); border-radius: 8px; padding: 12px; margin-top: 12px; white-space: pre-wrap; }
  .muted { color: var(--muted); }
  #toast {
    position: fixed; right: 18px; bottom: 18px; max-width: 360px; padding: 12px 14px;
    border-radius: 10px; border: 1px solid var(--line); background: #1c2740; color: var(--text);
    opacity: 0; transform: translateY(8px); transition: .2s; pointer-events: none;
  }
  #toast.show { opacity: 1; transform: none; }
  #toast.err { border-color: var(--red); }
  #toast.ok { border-color: var(--green); }
  code { background: #0d1320; padding: 1px 5px; border-radius: 5px; }
</style>
</head>
<body>
<header>
  <h1>AI Usage Metering &amp; Quota</h1>
  <span class="muted">demo UI</span>
  <div class="spacer"></div>
  <div class="userbar">
    <label style="margin:0">user</label>
    <input id="userId" value="alice" style="width:140px" />
    <button class="secondary" onclick="loadUser()">Load</button>
    <a class="muted" href="/docs" target="_blank" style="margin-left:8px">API docs ↗</a>
  </div>
</header>

<main>
  <div class="col">
    <div class="card">
      <h2>Configuration</h2>
      <label>Monthly allowance (credits)</label>
      <input id="allowance" type="number" value="100" min="0" />
      <label>Credit multiplier</label>
      <input id="multiplier" type="number" value="1.5" step="0.1" min="0.1" />
      <div style="height:12px"></div>
      <button onclick="saveConfig()" style="width:100%">Save configuration</button>
    </div>

    <div class="card">
      <h2>Usage &amp; remaining</h2>
      <div id="usageBody"><p class="muted">Load a user to see usage.</p></div>
    </div>
  </div>

  <div class="col">
    <div class="card">
      <h2>Generate</h2>
      <label>Prompt</label>
      <textarea id="prompt">Summarize the meeting notes</textarea>
      <label>max_tokens (optional)</label>
      <input id="maxTokens" type="number" placeholder="leave blank to use default" min="1" />
      <div style="height:12px"></div>
      <div class="row">
        <button onclick="generate()">Generate</button>
        <button class="secondary" onclick="generate('[FAIL]')">Simulate AI failure</button>
        <button class="secondary" onclick="generate('[FAIL_PARTIAL]')">Partial failure</button>
      </div>
      <div id="result"></div>
    </div>

    <div class="card">
      <h2>Usage history</h2>
      <div id="historyBody"><p class="muted">No requests yet.</p></div>
    </div>
  </div>
</main>

<div id="toast"></div>

<script>
const $ = (id) => document.getElementById(id);
const userId = () => $("userId").value.trim();

let toastTimer;
function toast(msg, kind) {
  const t = $("toast");
  t.textContent = msg;
  t.className = "show " + (kind || "");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => (t.className = ""), 3800);
}

async function api(method, path, body) {
  const opts = { method, headers: { "content-type": "application/json" } };
  if (body !== undefined) opts.body = JSON.stringify(body);
  const res = await fetch(path, opts);
  let data = null;
  try { data = await res.json(); } catch (e) {}
  return { ok: res.ok, status: res.status, data };
}

async function saveConfig() {
  const body = {
    monthly_allowance: Number($("allowance").value),
    multiplier: Number($("multiplier").value),
  };
  const r = await api("PUT", `/users/${userId()}/config`, body);
  if (r.ok) { toast(`Saved config for ${userId()}`, "ok"); refreshUsage(); refreshHistory(); }
  else toast(`Save failed (${r.status})`, "err");
}

function pct(n, d) { return d > 0 ? Math.max(0, Math.min(100, (n / d) * 100)) : 0; }

async function refreshUsage() {
  const r = await api("GET", `/users/${userId()}/usage`);
  const el = $("usageBody");
  if (r.status === 404) { el.innerHTML = `<p class="muted">User <code>${userId()}</code> is not configured. Save a configuration first.</p>`; return; }
  if (!r.ok) { toast(`Usage failed (${r.status})`, "err"); return; }
  const u = r.data;
  const used = u.used_credits + u.reserved_credits;
  const over = used > u.monthly_allowance;
  el.innerHTML = `
    <div class="metrics">
      <div class="metric"><div class="k">Allowance</div><div class="v">${u.monthly_allowance}</div></div>
      <div class="metric"><div class="k">Multiplier</div><div class="v">${u.multiplier}×</div></div>
      <div class="metric"><div class="k">Used</div><div class="v">${u.used_credits}</div></div>
      <div class="metric"><div class="k">Remaining</div><div class="v" style="color:${u.remaining_credits < 0 ? 'var(--red)' : 'var(--green)'}">${u.remaining_credits}</div></div>
    </div>
    <div class="bar ${over ? 'over' : ''}"><span style="width:${pct(used, u.monthly_allowance)}%"></span></div>
    <p class="muted" style="margin:8px 0 0">reserved: ${u.reserved_credits} · used+reserved: ${used} / ${u.monthly_allowance}</p>
    <div style="height:10px"></div>
    <button class="ghost" onclick="refreshUsage()" style="width:100%">Refresh</button>`;
  // reflect config fields
  $("allowance").value = u.monthly_allowance;
  $("multiplier").value = u.multiplier;
}

async function generate(inject) {
  let prompt = $("prompt").value;
  if (inject) prompt = `${inject} ${prompt}`;
  const body = { prompt };
  const mt = $("maxTokens").value;
  if (mt) body.max_tokens = Number(mt);

  const r = await api("POST", `/users/${userId()}/generate`, body);
  const el = $("result");

  if (r.status === 200) {
    const u = r.data.usage;
    el.innerHTML = `
      <div class="result">
        <span class="badge success">success</span>
        <div style="margin-top:8px">${escapeHtml(r.data.text)}</div>
        <hr style="border:0;border-top:1px solid var(--line);margin:10px 0" />
        <div class="muted">tokens: ${u.prompt_tokens} prompt + ${u.completion_tokens} completion = ${u.total_tokens}</div>
        <div>estimated <b>${u.estimated_credits}</b> → actual <b>${u.actual_credits}</b> credits · remaining <b>${r.data.remaining_credits}</b></div>
      </div>`;
    toast("Generated", "ok");
  } else if (r.status === 402) {
    const d = r.data.detail;
    el.innerHTML = `<div class="result"><span class="badge rejected">quota exceeded · 402</span>
      <div style="margin-top:8px">Needs <b>${d.required_credits}</b> credits, only <b>${d.remaining_credits}</b> remaining.</div></div>`;
    toast("Quota exceeded", "err");
  } else if (r.status === 404) {
    el.innerHTML = `<div class="result"><span class="badge rejected">not configured · 404</span>
      <div style="margin-top:8px">Configure user <code>${userId()}</code> first.</div></div>`;
    toast("User not configured", "err");
  } else if (r.status === 502) {
    el.innerHTML = `<div class="result"><span class="badge failed">AI failure · 502</span>
      <div style="margin-top:8px">${escapeHtml(typeof r.data.detail === 'string' ? r.data.detail : 'AI generation failed')}</div></div>`;
    toast("AI generation failed", "err");
  } else {
    el.innerHTML = `<div class="result">Error ${r.status}</div>`;
  }
  refreshUsage();
  refreshHistory();
}

async function refreshHistory() {
  const r = await api("GET", `/users/${userId()}/usage/records`);
  const el = $("historyBody");
  if (r.status === 404 || !r.ok) { el.innerHTML = `<p class="muted">No history.</p>`; return; }
  const rows = r.data;
  if (!rows.length) { el.innerHTML = `<p class="muted">No requests yet.</p>`; return; }
  el.innerHTML = `<div style="overflow:auto"><table>
    <tr><th>#</th><th>Status</th><th>Prompt</th><th>Compl.</th><th>Est.</th><th>Actual</th><th>Mult.</th><th>Time</th></tr>
    ${rows.map(x => `<tr>
      <td>${x.id}</td>
      <td><span class="badge ${x.status}">${x.status}</span></td>
      <td>${x.prompt_tokens}</td>
      <td>${x.completion_tokens}</td>
      <td>${x.estimated_credits}</td>
      <td>${x.actual_credits}</td>
      <td>${x.multiplier_at_time}×</td>
      <td class="muted">${new Date(x.created_at + 'Z').toLocaleTimeString()}</td>
    </tr>`).join("")}
  </table></div>`;
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c]));
}

function loadUser() { refreshUsage(); refreshHistory(); }
loadUser();
</script>
</body>
</html>
